<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mad Libs Game</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"/>
</head>
<body>
    <div id="madLibInputs" class="container">
    <div>
        <label for="pnoun">pluralnoun</label>
        <input type="text" id="pnoun" class="form-control">
    </div>
    <div>
        <label for="noun1">noun1</label>
        <input type="text" id="noun1" class="form-control">
        </div>
        <div>
            <label for="noun2">noun2</label>
            <input type="text" id="noun2" class="form-control">
        </div>
        <div>
            <label for="song">song</label>
            <input type="text" id="song" class="form-control">
        </div>
        <div>
            <label for="verb">verb</label>
            <input type="text" id="verb" class="form-control">
        </div>
        <a id="nextBtn" class="btn btn-danger rounded-0 mt-3"  type="button">Next</a></div>
<div class="container-fluid d-none" id="madLibOutput">
      <div class="card p-4 bg-secondary text-white w-75 m-auto ">
        <textarea
          id="madLibOutputText"
          class="form-control bg-dark text-white h-100 border-0"
          rows="20"></textarea>
        <a id="playBtn" href="index.html" class="btn btn-danger w-25  mt-3" type="button"
        >Play Again</a>
    </div></div>
    <script src="index.js"></script>
</body>
</html>
